# Inert PR-time stub for Tier 2 required checks (microsoft/apm#770).
#
# Why this file exists:
#   The merge-queue ruleset requires four Tier 2 checks (Build (Linux),
#   Smoke Test (Linux), Integration Tests (Linux), Release Validation
#   (Linux)). Those checks are produced for real by `ci-integration.yml`,
#   which only triggers on `merge_group` events. Without this stub, the
#   required checks would never report on PR head SHAs and every PR would
#   be permanently BLOCKED in branch protection.
#
#   This workflow uses `pull_request_target` so the YAML is read from the
#   base branch (`main`) regardless of the PR head's contents. That means:
#     - the trigger applies retroactively to existing fork PRs
#     - a fork cannot bypass or modify the no-op behaviour by editing this
#       file in their PR head
#
# Security model (READ BEFORE EDITING):
#   This file is allowed to use `pull_request_target` ONLY because it is
#   inert: no secrets, no checkout, no PR data interpolation into `run:`,
#   no GITHUB_TOKEN write permissions. The classic `pull_request_target`
#   exploit (checkout fork code, then run it with secrets) is impossible
#   here by construction.
#
#   DO NOT add any of the following without a thorough security review:
#     - actions/checkout (especially with `ref: ${{ github.event.pull_request.head.sha }}`)
#     - any `run:` step that interpolates `${{ github.event.pull_request.* }}`
#     - any `env:` block referencing `secrets.*`
#     - any `permissions:` block elevating GITHUB_TOKEN beyond `{}`
#     - any new job (each new check name must remain a no-op)
#
#   If you need to add real secret-using or checkout work, do it in
#   `ci-integration.yml` under the `merge_group` trigger - never here.
#
# Stale-run cleanup:
#   The activity-type list intentionally includes labeled/unlabeled/edited
#   so maintainers can re-trigger the stub without forcing contributors to
#   push commits or close+reopen.
name: Integration Tests (PR Stub)

on:
  pull_request_target:
    branches: [ main ]
    types: [ opened, synchronize, reopened, ready_for_review, labeled, unlabeled, edited ]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (Linux)
    runs-on: ubuntu-24.04
    steps:
      - run: echo "PR-time stub for required check 'Build (Linux)'. Real run happens in ci-integration.yml on merge_group events."

  smoke-test:
    name: Smoke Test (Linux)
    runs-on: ubuntu-24.04
    steps:
      - run: echo "PR-time stub for required check 'Smoke Test (Linux)'. Real run happens in ci-integration.yml on merge_group events."

  integration-tests:
    name: Integration Tests (Linux)
    runs-on: ubuntu-24.04
    steps:
      - run: echo "PR-time stub for required check 'Integration Tests (Linux)'. Real run happens in ci-integration.yml on merge_group events."

  release-validation:
    name: Release Validation (Linux)
    runs-on: ubuntu-24.04
    steps:
      - run: echo "PR-time stub for required check 'Release Validation (Linux)'. Real run happens in ci-integration.yml on merge_group events."
